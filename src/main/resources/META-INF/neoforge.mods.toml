modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
displayTest = "IGNORE_ALL_VERSION"
description = '''${mod_description}'''

[[mixins]]
config = "${mod_id}.mixins.json"

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "CLIENT"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "CLIENT"

[[dependencies."${mod_id}"]]
modId = "petrolpark"
type = "required"
versionRange = "[${petrolpark_version}]"
ordering = "AFTER"
side = "CLIENT"

[[dependencies."${mod_id}"]]
modId = "jei"
type = "required"
versionRange = "[${jei_version}]"
ordering = "AFTER"
side = "CLIENT"

[[dependencies."${mod_id}"]]
modId = "create"
type = "required"
versionRange = "[${create_version}]"
ordering = "AFTER"
side = "CLIENT"
